        {
          "graphStyle":"sankey",
          "title":"AI Usage by Endpoint (URL-Based)",
          "colorMatching":"automatic",
          "query":"event.category='url'\nAND url.address contains:anycase(\n  \"chatgpt.com\", \"openai.com\",\n  \"claude.ai\", \"anthropic.com\",\n  \"gemini.google.com\", \"ai.google.dev\",\n  \"copilot.microsoft.com\",\n  \"perplexity.ai\",\n  \"grok.com\", \"x.ai\",\n  \"midjourney.com\",\n  \"poe.com\",\n  \"deepseek.com\",\n  \"notebooklm.google.com\", \"notebooklm.google\",\n  \"meta.ai\",\n  \"character.ai\",\n  \"copilot-proxy.githubusercontent.com\", \"api.githubcopilot.com\",\n  \"huggingface.co\",\n  \"stability.ai\",\n  \"replit.com\",\n  \"v0.dev\", \"bolt.new\",\n  \"cursor.sh\"\n)\n| let vendor =\n    url.address contains:anycase(\"chatgpt.com\", \"openai.com\") ? \"OpenAI\" :\n    url.address contains:anycase(\"claude.ai\", \"anthropic.com\") ? \"Anthropic\" :\n    url.address contains:anycase(\"gemini.google.com\", \"ai.google.dev\", \"notebooklm.google.com\", \"notebooklm.google\") ? \"Google\" :\n    url.address contains:anycase(\"copilot.microsoft.com\") ? \"Microsoft\" :\n    url.address contains:anycase(\"perplexity.ai\") ? \"Perplexity\" :\n    url.address contains:anycase(\"grok.com\", \"x.ai\") ? \"xAI\" :\n    url.address contains:anycase(\"midjourney.com\") ? \"Midjourney\" :\n    url.address contains:anycase(\"poe.com\") ? \"Poe\" :\n    url.address contains:anycase(\"deepseek.com\") ? \"DeepSeek\" :\n    url.address contains:anycase(\"meta.ai\") ? \"Meta\" :\n    url.address contains:anycase(\"character.ai\") ? \"Character.AI\" :\n    url.address contains:anycase(\"copilot-proxy.githubusercontent.com\", \"api.githubcopilot.com\") ? \"GitHub Copilot\" :\n    url.address contains:anycase(\"huggingface.co\") ? \"Hugging Face\" :\n    url.address contains:anycase(\"stability.ai\") ? \"Stability AI\" :\n    url.address contains:anycase(\"replit.com\") ? \"Replit\" :\n    url.address contains:anycase(\"v0.dev\", \"bolt.new\") ? \"AI Dev Tools\" :\n    url.address contains:anycase(\"cursor.sh\") ? \"Cursor\" :\n    \"Other\"\n| let host = \"\uD83D\uDCBB \" + endpoint.name\n| let user = src.process.user != null ? \"\uD83D\uDC64 \" + src.process.user + \" (user)\" : \"\uD83D\uDC64 No User Attributed\"\n| group c = count() by vendor, host, user\n| sort -c\n| limit 35\n| let link = array(0, 1, 2).expand()\n| let source = link == 0 ? \"All AI Network Events\" :\n               link == 1 ? vendor : host\n| let target = link == 0 ? vendor :\n               link == 1 ? host : user\n| group c = sum(c) by source, target\n| columns source, target, c",
          "sankeyColorScheme":"default",
          "showNodeValues":"true",
