    start\": \"2026-04-20T03:39:36.195181+00:00Z\",\n  \"end\": \"2026-04-20T03:43:52.195181+00:00Z\"\
    ,\n  \"bytesIn\": 4600851,\n  \"bytesOut\": 9562264,\n  \"packetsIn\": 2235,\n  \"packetsOut\": 8133\n\
    }"
