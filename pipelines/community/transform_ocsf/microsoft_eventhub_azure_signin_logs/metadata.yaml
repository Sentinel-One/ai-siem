metadata_details:
  purpose: OCSF-compliant Lua serializer for Microsoft Eventhub Azure Signin Logs. Maps source events
    to OCSF Network Activity (class_uid=4001) following the processEvent contract.
  datasource_vendor: microsoft
  dataSource: Microsoft Eventhub Azure Signin Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  sample_record: "{\n  \"timestamp\": \"2026-04-20T03:40:52.863882Z\",\n  \"vendor\": \"Microsoft\",\n\
    \  \"product\": \"Eventhub Azure Signin Logs\",\n  \"version\": \"1.0\",\n  \"event_type\": \"security_event\"\
    ,\n  \"message\": \"Sample Microsoft Eventhub Azure Signin Logs event at 2026-04-20T03:40:52.863882Z\"\
    ,\n  \"severity\": \"critical\",\n  \"category\": \"security\",\n  \"source_ip\": \"192.168.69.101\"\
    ,\n  \"user\": \"user4034\",\n  \"device\": \"device-949\",\n  \"log_level\": \"WARN\",\n  \"event_id\"\
    : 45292,\n  \"session_id\": \"sess_602711\",\n  \"class_name\": \"Security Event\",\n  \"activity_name\"\
    : \"Log Generated\",\n  \"location\": \"Sydney\"\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
    class_uid: 4001
    class_name: Network Activity
    category_uid: 4
    category_name: Network Activity
