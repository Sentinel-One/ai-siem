metadata_details:
  purpose: OCSF-compliant Lua serializer for Aws Waf. Maps source events to OCSF HTTP Activity (class_uid=4002)
    following the processEvent contract.
  datasource_vendor: aws
  dataSource: Aws Waf
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  sample_record: "{\n  \"timestamp\": \"2026-04-20T03:40:52Z\",\n  \"formatVersion\": \"1.0\",\n  \"webaclId\"\
    : \"arn:aws:wafv2:us-east-1:757912648842:regional/webacl/ExampleWebACL-1711\",\n  \"ruleGroupId\"\
    : \"XSSRules\",\n  \"terminatingRuleType\": \"RATE_BASED\",\n  \"action\": \"CAPTCHA\",\n  \"httpRequest\"\
    : {\n    \"clientIp\": \"44.53.65.206\",\n    \"country\": \"IN\",\n    \"uri\": \"/products\",\n\
    \    \"args\": \"cmd=ls -la\",\n    \"httpVersion\": \"HTTP/1.1\",\n    \"httpMethod\": \"PUT\",\n\
    \    \"headers\": [\n      {\n        \"name\": \"Host\",\n        \"value\": \"example5.com\"\n \
    \     },\n      {\n        \"name\": \"User-Agent\",\n        \"value\": \"Googlebot/2.1\"\n     \
    \ }\n    ]\n  }\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
    class_uid: 4002
    class_name: HTTP Activity
