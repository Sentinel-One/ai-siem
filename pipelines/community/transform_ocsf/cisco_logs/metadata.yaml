metadata_details:
  purpose: OCSF-compliant Lua serializer for Cisco Logs. Maps source events to OCSF Network Activity (class_uid=4001)
    following the processEvent contract.
  datasource_vendor: cisco
  dataSource: Cisco Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  sample_record: "{\n  \"timestamp\": \"2026-04-19T19:27:52.744586+00:00\",\n  \"hostname\": \"firewall-22\"\
    ,\n  \"device_ip\": \"73.247.139.85\",\n  \"facility\": \"LOCAL1\",\n  \"severity\": \"info\",\n \
    \ \"mnemonic\": \"UPDOWN\",\n  \"facility_mnemonic\": \"LINK\",\n  \"sequence_number\": 940259,\n\
    \  \"message\": \"Interface GigabitEthernet0/0, changed state to down\",\n  \"raw_message\": \"*Apr\
    \ 19 19:27:52.744: %LINK-INFO-UPDOWN: Interface GigabitEthernet0/0, changed state to down\",\n  \"\
    process_name\": \"LINK\",\n  \"ios_version\": \"16.0.1\",\n  \"hardware_platform\": \"ISR4321\",\n\
    \  \"uptime\": \"266 days, 1 hours, 11 minutes\",\n  \"location\": \"Building-B\",\n  \"interface_name\"\
    : \"GigabitEthernet0/0\",\n  \"interface_status\": \"down\",\n  \"interface_speed\": \"10000Mbps\"\
    ,\n  \"interface_duplex\": \"half\"\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
    class_uid: 4001
    class_name: Network Activity
    category_uid: 4
    category_name: Network Activity
