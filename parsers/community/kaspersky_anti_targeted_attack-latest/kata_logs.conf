{
  // ==========================================================================
  // Kaspersky Anti Targeted Attack Platform (KATA) - CEF Parser
  // ==========================================================================
  // Parses native CEF output from KATA appliances.
  // Handles three event types:
  //   - heartbeat       → OCSF Entity Management (3004)
  //   - file_endpoint   → OCSF Detection Finding (2004)
  //   - taaScanning     → OCSF Detection Finding (2004)
  //
  // Tested against KATA versions: 7.1.1-531, 7.1.3-533
  // ==========================================================================

  attributes: {
    "dataSource.category":          "security",
    "dataSource.name":              "Kaspersky KATA",
    "dataSource.vendor":            "Kaspersky",
    "metadata.product.name":        "Kaspersky Anti Targeted Attack Platform",
    "metadata.product.vendor_name": "AO Kaspersky Lab",
    "metadata.version":             "1.0.0",
  },

  patterns: {
    // Reusable regex building blocks
    tsPattern:       "\\w+\\s+\\d+\\s+\\d+\\s+\\d+:\\d+:\\d+",
    compactTs:       "\\d{12}",
    ipPattern:       "[\\d.]+",
    intPattern:      "\\d+",
    hashPattern:     "[0-9a-fA-F]+",
    wordPattern:     "[^\\s]+",
    hostnamePattern: "[^\\s]+",
    // File paths may contain spaces (e.g. Windows "program files") — capture
    // everything up to the next key= or end of line
    filePathPattern: "[^=]+?(?=\\s+\\w+=|$)",
    // CEF severity: single word (Low, Medium, High, 0, etc.)
    severityPattern: "[^\\|]+",
    // For key=value generic extraction
    keyPattern:      "[\\w.]+",
    // Value up to next key= or end of line
    valuePattern:    "[^=]+?(?=\\s+[\\w.]+=|$)",
    // Component name/state pairs for heartbeat
    componentName:   "[^\\s]+",
    componentState:  "\\d+",
    // Drop non-CEF lines (e.g. blank lines, syslog wrappers)
    toDrop:          "^(?!\\s*CEF:).*$",
  },

  formats: [
    // ========================================================================
    // STEP 0: Drop non-CEF lines
    // ========================================================================
    {
      id:      "drop-non-cef",
      format:  "$unwanted=toDrop$",
      discard: true,
    },

    // ========================================================================
    // STEP 1: Parse the CEF header (common to all event types)
    // ========================================================================
    // CEF:0|AO Kaspersky Lab|Kaspersky Anti Targeted Attack Platform|7.1.3-533|<signatureId>|<n>|<severity>|
    {
      format: "\\s*CEF:$unmapped.cef_version$\\|$unmapped.cef_device_vendor$\\|$unmapped.cef_device_product$\\|$metadata.product.version$\\|$unmapped.cef_signature_id$\\|$unmapped.cef_name$\\|$unmapped.cef_severity=severityPattern$\\|",
    },

    // ========================================================================
    // STEP 2: Common extension fields (present in most/all event types)
    // ========================================================================
    {
      format: ".*\\sdvchost=$device.hostname=hostnamePattern$",
    },
    {
      format: ".*\\sdeviceExternalId=$device.uid=wordPattern$",
    },
    {
      format: ".*\\srt=$time=tsPattern$",
    },

    // ========================================================================
    // STEP 3: Fields specific to file_endpoint and taaScanning
    // ========================================================================
    {
      format: ".*\\seventId=$unmapped.kata_event_id=intPattern$",
    },
    {
      format: ".*\\ssrc=$src_endpoint.ip=ipPattern$",
    },
    {
      format: ".*\\sshost=$src_endpoint.hostname=hostnamePattern$",
    },

    // ========================================================================
    // STEP 4: File-related fields (file_endpoint only)
    // ========================================================================
    {
      format: ".*\\sfName=$file.name=wordPattern$",
    },
    {
      format: ".*\\sfsize=$file.size=intPattern$",
    },
    {
      format: ".*\\sfileHash=$unmapped.file_md5=hashPattern$",
    },
    {
      format: ".*\\sKasperskyLabKATAfileSHA256=$unmapped.file_sha256=hashPattern$",
    },
    {
      format: ".*\\sKasperskyLabKATAcompositeFilePath=$file.path=filePathPattern$",
    },
    {
      format: ".*\\sKasperskyLabKATAcompositeFileHash=$unmapped.composite_file_md5=hashPattern$",
    },
    // cs2 = scan technology (e.g. AM for Anti-Malware)
    {
      format: ".*\\scs2=$unmapped.kata_scan_technology=wordPattern$",
    },
    // cs3 = compact timestamp YYYYMMDDHHmm (scan/processing time)
    {
      format: ".*\\scs3=$unmapped.kata_scan_time=compactTs$",
    },
    // filePath (duplicate of compositeFilePath in file_endpoint)
    {
      format: ".*\\sfilePath=$unmapped.kata_file_path=filePathPattern$",
    },

    // ========================================================================
    // STEP 5: cs1 - detection verdicts (file_endpoint) or TAA rule (taaScanning)
    // ========================================================================
    // Both lines write to the same field unmapped.kata_cs1 to avoid duplication.
    //
    // Line 1 — file_endpoint: literal " cs3=" after the field specifier is a hard
    // boundary so commaSeparatedValues cannot overrun into the rest of the message.
    // Produces unmapped.kata_cs1[0..N] cleanly.
    {
      format: ".*\\scs1=$unmapped.kata_cs1{parse=commaSeparatedValues}$ cs3=",
    },
    // Line 2 — taaScanning fallback: cs1 is the last field, no cs3= follows.
    // Only matches taaScanning events (file_endpoint already matched line 1).
    // Single TAA rule name lands in unmapped.kata_cs1[0].
    {
      format: ".*\\scs1=$unmapped.kata_cs1{parse=commaSeparatedValues}$",
    },

    // ========================================================================
    // STEP 6: Heartbeat component name/state pairs (1-12)
    // ========================================================================
    {
      format: ".*\\sKasperskyLabKATAcomponent1Name=$unmapped.kata_component_1_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent1State=$unmapped.kata_component_1_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent2Name=$unmapped.kata_component_2_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent2State=$unmapped.kata_component_2_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent3Name=$unmapped.kata_component_3_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent3State=$unmapped.kata_component_3_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent4Name=$unmapped.kata_component_4_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent4State=$unmapped.kata_component_4_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent5Name=$unmapped.kata_component_5_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent5State=$unmapped.kata_component_5_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent6Name=$unmapped.kata_component_6_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent6State=$unmapped.kata_component_6_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent7Name=$unmapped.kata_component_7_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent7State=$unmapped.kata_component_7_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent8Name=$unmapped.kata_component_8_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent8State=$unmapped.kata_component_8_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent9Name=$unmapped.kata_component_9_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent9State=$unmapped.kata_component_9_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent10Name=$unmapped.kata_component_10_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent10State=$unmapped.kata_component_10_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent11Name=$unmapped.kata_component_11_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent11State=$unmapped.kata_component_11_state=componentState$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent12Name=$unmapped.kata_component_12_name=componentName$",
    },
    {
      format: ".*\\sKasperskyLabKATAcomponent12State=$unmapped.kata_component_12_state=componentState$",
    },
  ],

  // ==========================================================================
  // OCSF Mappings - predicate-driven per event type
  // ==========================================================================
  mappings: {
    version: 0,
    mappings: [
      // ====================================================================
      // file_endpoint → Detection Finding (2004)
      // ====================================================================
      {
        predicate: "unmapped.cef_signature_id = 'file_endpoint'",
        renames: [
          { inputs: ["unmapped.kata_event_id"],        output: "finding_info.uid",             type: "string" },
          { inputs: ["unmapped.cef_name"],             output: "finding_info.title",           type: "string" },
          { inputs: ["unmapped.kata_scan_technology"], output: "finding_info.analytic.name",   type: "string" },
          { inputs: ["unmapped.cef_severity"],         output: "severity",                     type: "string" },
          // cs1 split by commaSeparatedValues — bounded by literal cs3= in format line
          // Up to 5 verdicts observed in samples; absent entries are silently ignored
          { inputs: ["unmapped.kata_cs1[0]"],          output: "finding_info.types[0]",        type: "string" },
          { inputs: ["unmapped.kata_cs1[1]"],          output: "finding_info.types[1]",        type: "string" },
          { inputs: ["unmapped.kata_cs1[2]"],          output: "finding_info.types[2]",        type: "string" },
          { inputs: ["unmapped.kata_cs1[3]"],          output: "finding_info.types[3]",        type: "string" },
          { inputs: ["unmapped.kata_cs1[4]"],          output: "finding_info.types[4]",        type: "string" },
          { inputs: ["unmapped.file_md5"],             output: "file.hashes[0].value",         type: "string" },
          { inputs: ["unmapped.file_sha256"],          output: "file.hashes[1].value",         type: "string" },
          { inputs: ["unmapped.cef_signature_id"],     output: "unmapped.kata_event_type",     type: "string" },
          { inputs: ["unmapped.kata_scan_time"],       output: "unmapped.kata_scan_timestamp", type: "string" },
        ],
        constants: [
          { value: 2004,                        field: "class_uid" },
          { value: 2,                           field: "category_uid" },
          { value: "Findings",                  field: "category_name" },
          { value: "Detection Finding",         field: "class_name" },
          { value: 1,                           field: "activity_id" },
          { value: "Create",                    field: "activity_name" },
          { value: 200401,                      field: "type_uid" },
          { value: "Detection Finding: Create", field: "type_name" },
          { value: "MD5",                       field: "file.hashes[0].algorithm" },
          { value: 1,                           field: "file.hashes[0].algorithm_id" },
          { value: "SHA-256",                   field: "file.hashes[1].algorithm" },
          { value: 3,                           field: "file.hashes[1].algorithm_id" },
          { value: "Rule",                      field: "finding_info.analytic.type" },
          { value: 1,                           field: "finding_info.analytic.type_id" },
        ],
      },

      // ====================================================================
      // taaScanning → Detection Finding (2004)
      // ====================================================================
      // cs1 for taaScanning is always a single TAA rule name, captured into
      // unmapped.kata_cs1[0] via the fallback format line (no cs3= boundary).
      {
        predicate: "unmapped.cef_signature_id = 'taaScanning'",
        renames: [
          { inputs: ["unmapped.kata_event_id"],    output: "finding_info.uid",           type: "string" },
          { inputs: ["unmapped.cef_name"],         output: "finding_info.title",         type: "string" },
          { inputs: ["unmapped.kata_cs1[0]"],      output: "finding_info.analytic.name", type: "string" },
          { inputs: ["unmapped.cef_severity"],     output: "severity",                   type: "string" },
          { inputs: ["unmapped.cef_signature_id"], output: "unmapped.kata_event_type",   type: "string" },
        ],
        constants: [
          { value: 2004,                        field: "class_uid" },
          { value: 2,                           field: "category_uid" },
          { value: "Findings",                  field: "category_name" },
          { value: "Detection Finding",         field: "class_name" },
          { value: 1,                           field: "activity_id" },
          { value: "Create",                    field: "activity_name" },
          { value: 200401,                      field: "type_uid" },
          { value: "Detection Finding: Create", field: "type_name" },
          { value: "IoA",                       field: "finding_info.analytic.type" },
          { value: 1,                           field: "finding_info.analytic.type_id" },
        ],
      },

      // ====================================================================
      // heartbeat → Entity Management (3004)
      // ====================================================================
      {
        predicate: "unmapped.cef_signature_id = 'heartbeat'",
        renames: [
          { inputs: ["unmapped.cef_name"],         output: "activity_name",            type: "string" },
          { inputs: ["unmapped.cef_severity"],     output: "severity",                 type: "string" },
          { inputs: ["unmapped.cef_signature_id"], output: "unmapped.kata_event_type", type: "string" },
        ],
        constants: [
          { value: 3004,                           field: "class_uid" },
          { value: 3,                              field: "category_uid" },
          { value: "Identity & Access Management", field: "category_name" },
          { value: "Entity Management",            field: "class_name" },
          { value: 99,                             field: "activity_id" },
          { value: "Other",                        field: "activity_name" },
          { value: 300499,                         field: "type_uid" },
          { value: "Entity Management: Other",     field: "type_name" },
          { value: 1,                              field: "severity_id" },
        ],
      },
    ],
  },
}