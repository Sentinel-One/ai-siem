metadata_details:
  purpose: OCSF-compliant Lua serializer for Mimecast Mimecast Logs. Maps source events to OCSF Network
    Activity (class_uid=4001) following the processEvent contract.
  datasource_vendor: mimecast
  dataSource: Mimecast Mimecast Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  ingest_mode: "API Call"
  auth_type: "API Key & Secret"
  sample_record: "{\n  \"identifier\": \"TTP Impersonation Protection\",\n  \"mimecastEvent\": {\n   \
    \ \"date\": \"2026-04-20T03:40:53+0000\",\n    \"senderAddress\": \"CEO <ceo@fake-enterprise.com>\"\
    ,\n    \"recipientAddress\": \"nyota.uhura@business.com\",\n    \"subject\": \"CEO: Quick question\"\
    ,\n    \"messageId\": \"<019cd0cb-7aeb-48cc-91af-eca9651064c7@outlook.com>\",\n    \"impersonationType\"\
    : \"Display Name\",\n    \"targetedUser\": \"CEO\",\n    \"actionTriggered\": \"quarantine\",\n  \
    \  \"route\": \"inbound\",\n    \"direction\": \"Inbound\",\n    \"confidence\": 91,\n    \"details\"\
    : \"Impersonation attempt detected: Display Name\",\n    \"ingestType\": \"ttp_impersonation\"\n \
    \ }\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
