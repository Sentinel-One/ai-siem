metadata_details:
  purpose: |
    Adds an IP address to the FortiGate firewall blocklist by creating a /32 address object and (optionally) updating member lists. 
    Supports both manual triggering and integration into automated response playbooks for blocking malicious IPs.
  
  trigger_type: manual
  integration_dependency:
    - FortiGate Firewall
    - FortiGate REST API (v2)
  
  human_in_the_loop: yes
  expected_actions_per_run: 8-10
  
  tags: ["ai-siem", "network security", "blocklist", "automation", "block ip"]
  
  mitre_attack_mapping: null
  data_sources:
    - SentinelOne AI SIEM alerts
    - Manual input
  
  version: "1.0.0"
  author: "Marco Rottigni a.k.a. RoarinPenguin"
  last_updated: "2026-04-04"
