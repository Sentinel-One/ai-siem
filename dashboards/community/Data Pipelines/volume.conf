{
  "duration": "1 hour",
  "description": "DPM pipeline optimization: raw ingested bytes vs. optimized/charged bytes for Okta.",
  "graphs": [
    {
      "graphStyle": "markdown",
      "markdown": "Tracks **before_bytes** (raw ingested volume) vs. **sca:bytesToCharge** (post-pipeline-optimization chargeable volume) for dataSource.name='Okta'. All panels are scoped to Okta — swap the dataSource.name filter in each query to point at a different pipeline/source. Panels reading **0** are a valid result: it means no before_bytes events have landed yet for this account/source in the selected time range, not a broken query — re-check once the pipeline is emitting this metric here.",
      "layout": {
  h: 6,
  w: 60,
  x: 0,
  y: 0
},
      title: " "
    },
    {
      "title": "Before (raw ingested)",
      "graphStyle": "number",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge))\n| columns before_bytes\n| limit 1",
      "options": {
        "format": "bytes",
        "precision": "1"
      },
      "layout": {
  h: 10,
  w: 15,
  x: 0,
  y: 6
}
    },
    {
      "title": "After (optimized / charged)",
      "graphStyle": "number",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge))\n| columns after_bytes\n| limit 1",
      "options": {
        "format": "bytes",
        "precision": "1",
        "color": "#1B8A6B"
      },
      "layout": {
  h: 10,
  i: "2",
  minH: 3,
  minW: 6,
  w: 15,
  x: 15,
  y: 6
},
      sparklineConfig: {enabled: true},
      trendConfig: {
        enabled: true,
        indicators: {
          arrow: {enabled: true},
          number: {
            calculationType: "ABSOLUTE",
            enabled: true
          },
          upwardsMeaning: "POSITIVE"
        }
      }
    },
    {
      "title": "Bytes saved",
      "graphStyle": "number",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge))\n| let saved_bytes = before_bytes - after_bytes\n| columns saved_bytes\n| limit 1",
      "options": {
        "format": "bytes",
        "precision": "1",
        "color": "#1B8A6B"
      },
      "layout": {
  h: 10,
  i: "3",
  minH: 3,
  minW: 6,
  w: 15,
  x: 30,
  y: 6
},
      sparklineConfig: {enabled: true},
      trendConfig: {
        enabled: true,
        indicators: {
          arrow: {enabled: true},
          number: {
            calculationType: "ABSOLUTE",
            enabled: true
          },
          upwardsMeaning: "POSITIVE"
        }
      }
    },
    {
      "title": "% reduction",
      "graphStyle": "number",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge))\n| let pct = before_bytes > 0 ? (before_bytes - after_bytes) / before_bytes * 100 : 0\n| columns pct\n| limit 1",
      "options": {
        "format": "auto",
        "precision": "1",
        "suffix": "%",
        "color": "#6B0AEA"
      },
      "layout": {
  h: 10,
  w: 15,
  x: 45,
  y: 6
}
    },
    {
      "title": "Volume flow: raw ingested -> pipeline -> optimized / reduced",
      "graphStyle": "sankey",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge)) by dataSource.pipelineName\n| let reduced = before_bytes - after_bytes\n| let link = array(0, 1, 2).expand()\n| let source = link==0 ? 'Raw ingested' : dataSource.pipelineName\n| let target = link==0 ? dataSource.pipelineName : (link==1 ? 'Optimized (charged)' : 'Reduced')\n| let c = link==0 ? before_bytes : (link==1 ? after_bytes : reduced)\n| filter c > 0\n| group c=sum(c) by source, target\n| columns source, target, c",
      "colorMatching": "manual",
      "sankeyColorScheme": "semantic",
      "showNodeValues": "true",
      "sankeyColorMapping": [
        {
          "key": "positive",
          "value": [
            "Optimized*"
          ]
        },
        {
          "key": "warning",
          "value": [
            "Raw ingested"
          ]
        },
        {
          "key": "caution",
          "value": [
            "Reduced"
          ]
        }
      ],
      "layout": {
  h: 22,
  w: 30,
  x: 0,
  y: 16
}
    },
    {
      "title": "Before vs. after bytes over time",
      "graphStyle": "line",
      "lineSmoothing": "smoothCurves",
      "layout": {
  h: 22,
  w: 30,
  x: 30,
  y: 16
},
      query: "before_bytes=*\n| group Before=avg(number(before_bytes)), After=avg(number(sca:bytesToCharge)) by timestamp=timebucket()\n| sort +timestamp"
    },
    {
      "title": "Breakdown by pipeline",
      "graphStyle": "table",
      "showBarsColumn": "true",
      "query": "before_bytes=*\n| group before_bytes=sum(number(before_bytes)), after_bytes=sum(number(sca:bytesToCharge)) by dataSource.pipelineName\n| let saved = before_bytes - after_bytes\n| let pct = before_bytes > 0 ? (saved / before_bytes) * 100 : 0\n| sort -before_bytes\n| columns Pipeline=dataSource.pipelineName, Before_Bytes=before_bytes, After_Bytes=after_bytes, Saved_Bytes=saved, Optimization_Pct=pct\n| limit 50",
      "layout": {
  h: 20,
  w: 60,
  x: 0,
  y: 38
}
    }
  ]
}
