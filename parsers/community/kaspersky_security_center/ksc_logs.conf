{
  // ==========================================================================
  // Kaspersky Security Center (KSC) - LEEF Parser
  // ==========================================================================
  // Parses native Kaspersky Security Center LEEF events and maps them to OCSF.
  //
  // Supported OCSF Detection Finding (2004) events:
  //   - GNRL_EV_OBJECT_CURED
  //   - GNRL_EV_OBJECT_BLOCKED
  //   - GNRL_EV_OBJECT_NOTCURED
  //   - GNRL_EV_OBJECT_DELETED
  //   - GNRL_EV_ADSEC_DETECT
  //   - GNRL_EV_VIRUS_FOUND
  //   - GNRL_EV_VIRUS_FOUND_AND_BLOCKED
  //   - GNRL_EV_VIRUS_FOUND_BY_KSN
  //   - GNRL_EV_ATTACK_DETECTED
  //   - GNRL_EV_DEVCTRL_DEV_UNPLUGGED
  //   - GNRL_EV_PASSWD_ARCHIVE_FOUND
  //   - KLSRV_HOST_STATUS_CRITICAL
  //
  // Supported OCSF Entity Management (3004) events:
  //   - KLPRCI_TaskState
  //   - KLSRV_UPD_BASES_UPDATED
  //   - KLSRV_HOST_MOVED_WITH_RULE_EX
  //   - KLNAG_EV_DEVICE_REMOVE
  //
  // Notes:
  //   - Input is expected to be native LEEF 1.0 output.
  //   - Event-specific fields are extracted from both standard LEEF extensions
  //     and nested EVC_EV_DESC content when present.
  // ==========================================================================

  attributes: {
    "dataSource.category": "security",
    "dataSource.name": "Kaspersky Security Center",
    "dataSource.vendor": "KasperskyLab",
    "metadata.product.name": "Security Center",
    "metadata.product.vendor_name": "KasperskyLab",
    "metadata.version": "1.5.1",
  },

  patterns: {
    // Reusable regex patterns
    tsPattern: "\\d{4}-\\d{2}-\\d{2}\\s\\d{2}:\\d{2}:\\d{2}",
    ipPattern: "[\\d.]+",
    macPattern: "[a-fA-F0-9-]{17}",
    hashPattern: "[0-9a-fA-F]{32,64}",
    wordPattern: "[^\\s]+",
    intPattern: "\\d+",

    // Captures the user value up to the " (" suffix or a newline
    userPattern: "[^(]+?(?=\\s*\\(|\\\\r\\\\n)",

    // LEEF extension fields are typically tab-delimited.
    leefValuePattern: "[^\\t]+",

    // Captures values from EVC_EV_DESC, which contains literal \r\n sequences
    descValuePattern: ".+?(?=\\\\r\\\\n|\\t|$)",

    // Matches non-LEEF lines so they can be discarded early
    toDrop: "^(?!\\s*LEEF:).*$",
  },

  formats: [
    // ========================================================================
    // STEP 0: Discard non-LEEF lines
    // ========================================================================
    {
      id: "drop-non-leef",
      format: "$unwanted=toDrop$",
      discard: true,
    },

    // ========================================================================
    // STEP 1: Parse the LEEF header
    // ========================================================================
    {
      format: "\\s*LEEF:1\\.0\\|$unmapped.leef_vendor$\\|$unmapped.leef_product$\\|$metadata.product.version$\\|$unmapped.leef_event_id$\\|",
    },

    // ========================================================================
    // STEP 2: Common LEEF extension fields (present across all event types)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)devTime=$time=tsPattern$"
    }, {
      format: ".*(?:\\t|\\s)src=$unmapped.src_ip=ipPattern$"
    }, {
      format: ".*(?:\\t|\\s)identNetBios=$unmapped.netbios_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_DISP_HOST_NAME=$unmapped.hostname=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_GROUP_NAME=$unmapped.ksc_group_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_KL_PRODUCT_NAME=$unmapped.kl_product_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_KL_PRODUCT_DISPVER=$unmapped.kl_product_version=leefValuePattern$"
    },

    // Handle user-name field casing variations
    {
      format: ".*(?:\\t|\\s)usrName=$unmapped.ext_username=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)UsrName=$unmapped.ext_username=leefValuePattern$"
    },

    // ========================================================================
    // STEP 3: Extract task-related fields (KLPRCI_TaskState and similar events)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)EVC_EV_TASK_NAME=$unmapped.task_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_TASK_ID=$unmapped.task_id=intPattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_TASK_NEW_STATE=$unmapped.task_new_state=intPattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_TASK_OLD_STATE=$unmapped.task_old_state=intPattern$"
    },

    // ========================================================================
    // STEP 4: Host move rule fields (KLSRV_HOST_MOVED_WITH_RULE_EX)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)EVC_EV_RULE_NAME=$unmapped.rule_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_SRC_ADM_GRP_NAME=$unmapped.src_adm_group=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_DST_ADM_GRP_NAME=$unmapped.dst_adm_group=leefValuePattern$"
    },

    // ========================================================================
    // STEP 5: Extract device-control fields (GNRL_EV_DEVCTRL_DEV_UNPLUGGED,
    //         KLNAG_EV_DEVICE_REMOVE)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)EVC_EV_EXT_DEV_ID=$unmapped.ext_device_id=leefValuePattern$"
    },

    // Extract device-control details from EVC_EV_DESC
    {
      format: ".*(?:EVC_EV_DESC=|\\\\r\\\\n)Event type:\\s*$unmapped.desc_event_type=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nDevice category:\\s*$unmapped.desc_device_category=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nDevice type/Bus type:\\s*$unmapped.desc_device_bus_type=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nDevice ID:\\s*$unmapped.desc_device_id=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nDevice VID/PID:\\s*$unmapped.desc_device_vid_pid=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nResult\\\\Decision:\\s*$unmapped.desc_result_decision=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nResult\\\\Operation:\\s*$unmapped.desc_result_operation=descValuePattern$"
    },

    // ========================================================================
    // STEP 6: Extract file-threat fields (GNRL_EV_PASSWD_ARCHIVE_FOUND and similar)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)EVC_EV_FILE_Name=$unmapped.file_path=leefValuePattern$"
    }, {
      // Result description, for example "Password-protected"
      format: ".*\\\\r\\\\nResult description:\\s*$unmapped.desc_result_description=descValuePattern$"
    },

    // ========================================================================
    // STEP 7: Extract threat and attack detection fields
    //         (GNRL_EV_ATTACK_DETECTED, GNRL_EV_VIRUS_FOUND, etc.)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)EVC_EV_VIRUS_NAME=$unmapped.ext_virus_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_SHA256=$unmapped.ext_file_sha256=hashPattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_ATTACK_NAME=$unmapped.ext_attack_name=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)EVC_EV_ATTACKED_PROTOCOL=$unmapped.ext_attack_protocol=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)engine=$unmapped.engine_id=intPattern$"
    }, {
      format: ".*(?:\\t|\\s)method=$unmapped.method_id=intPattern$"
    },

    // ========================================================================
    // STEP 8: Extract anomaly and ADSEC fields (GNRL_EV_ADSEC_DETECT)
    // ========================================================================
    {
      format: ".*(?:\\t|\\s)RuleId=$unmapped.rule_id=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)SrcProcPath=$unmapped.src_proc_path=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)TrgProcPath=$unmapped.trg_proc_path=leefValuePattern$"
    }, {
      format: ".*(?:\\t|\\s)TrgObjPath=$unmapped.trg_obj_path=leefValuePattern$"
    },

    // ========================================================================
    // STEP 9: Extract shared fields from nested EVC_EV_DESC content
    // ========================================================================
    // User value without trailing role suffixes such as
    // " (Active user)", " (System user)", or " (Initiator)"
    {
      format: ".*(?:EVC_EV_DESC=|\\\\r\\\\n)User:\\s*$unmapped.desc_user=userPattern$"
    }, {
      format: ".*\\\\r\\\\nSHA256:\\s*$unmapped.file_sha256=hashPattern$"
    }, {
      format: ".*\\\\r\\\\nMD5:\\s*$unmapped.file_md5=hashPattern$"
    }, {
      format: ".*\\\\r\\\\nObject:\\s*$unmapped.desc_object_path=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nReason:\\s*$unmapped.desc_reason=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nProcess ID:\\s*$unmapped.desc_process_id=intPattern$"
    }, {
      format: ".*\\\\r\\\\nApplication path:\\s*$unmapped.desc_app_path=descValuePattern$"
    }, {
      // Greedy match to capture the last 'Name:' value, which is typically the
      // threat name rather than the process name
      format: ".*\\\\r\\\\nName:\\s*$unmapped.desc_name=descValuePattern$"
    }, {
      format: ".*\\\\r\\\\nType:\\s*$unmapped.desc_type=descValuePattern$"
    },

    // Network-threat fields
    {
      format: ".*\\\\r\\\\nSuspicious:\\s*\\d{2}/\\d{2}/\\d{4}\\s+\\d{2}:\\d{2}:\\d{2}:\\s*$unmapped.suspicious_mac=macPattern$\\s*->\\s*$unmapped.suspicious_target_ip=ipPattern$"
    },
  ],

  // ==========================================================================
  // OCSF mappings - predicate-driven routing
  // ==========================================================================
  mappings: {
    version: 0,
    mappings: [

      // ======================================================================
      // PATH A: Network attack detected (GNRL_EV_ATTACK_DETECTED)
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'GNRL_EV_ATTACK_DETECTED'",
        renames: [
          { inputs: ["unmapped.leef_event_id"],        output: "finding_info.uid",              type: "string"  },
          { inputs: ["unmapped.ext_attack_name"],      output: "finding_info.title",            type: "string"  },
          { inputs: ["unmapped.desc_name"],            output: "finding_info.title",            type: "string"  },
          { inputs: ["unmapped.desc_type"],            output: "finding_info.types[0]",         type: "string"  },
          { inputs: ["unmapped.ext_attack_protocol"],  output: "network_traffic.protocol",      type: "string"  },
          { inputs: ["unmapped.task_name"],            output: "finding_info.analytic.name",    type: "string"  },
          { inputs: ["unmapped.src_ip"],               output: "src_endpoint.ip",               type: "string"  },
          { inputs: ["unmapped.hostname"],             output: "device.hostname",               type: "string"  },
          { inputs: ["unmapped.suspicious_mac"],       output: "src_endpoint.mac",              type: "string"  },
          { inputs: ["unmapped.suspicious_target_ip"], output: "dst_endpoint.ip",               type: "string"  },
          { inputs: ["unmapped.desc_user"],            output: "user.userid",                   type: "string"  },
          { inputs: ["unmapped.ext_username"],         output: "user.userid",                   type: "string"  },
          { inputs: ["unmapped.desc_object_path"],     output: "unmapped.kaspersky_object",     type: "string"  },
          { inputs: ["unmapped.leef_event_id"],        output: "unmapped.kaspersky_event_type", type: "string"  },
        ],
        constants: [
          { value: 2004,                    field: "class_uid"      },
          { value: 2,                       field: "category_uid"   },
          { value: "Findings",              field: "category_name"  },
          { value: "Detection Finding",     field: "class_name"     },
          { value: 1,                       field: "activity_id"    },
          { value: "Create",                field: "activity_name"  },
          { value: 200401,                  field: "type_uid"       },
          { value: "Detection Finding: Create", field: "type_name"  },
        ],
      },

      // ======================================================================
      // PATH B: Device disconnected (GNRL_EV_DEVCTRL_DEV_UNPLUGGED)
      // Mapped as a Detection Finding for device-control policy enforcement.
      // Detailed USB device attributes are preserved in `unmapped`.
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'GNRL_EV_DEVCTRL_DEV_UNPLUGGED'",
        renames: [
          { inputs: ["unmapped.leef_event_id"],           output: "finding_info.uid",                    type: "string"  },
          { inputs: ["unmapped.task_name"],               output: "finding_info.analytic.name",          type: "string"  },
          { inputs: ["unmapped.hostname"],                output: "device.hostname",                     type: "string"  },
          { inputs: ["unmapped.src_ip"],                  output: "device.ip",                           type: "string"  },
          { inputs: ["unmapped.ext_username"],            output: "user.userid",                         type: "string"  },
          { inputs: ["unmapped.desc_user"],               output: "user.userid",                         type: "string"  },
          // Preserve detailed USB device attributes in `unmapped`
          { inputs: ["unmapped.ext_device_id"],           output: "unmapped.usb_device_id",              type: "string"  },
          { inputs: ["unmapped.desc_event_type"],         output: "unmapped.devctrl_event_type",         type: "string"  },
          { inputs: ["unmapped.desc_device_category"],    output: "unmapped.devctrl_device_category",    type: "string"  },
          { inputs: ["unmapped.desc_device_bus_type"],    output: "unmapped.devctrl_device_bus_type",    type: "string"  },
          { inputs: ["unmapped.desc_device_id"],          output: "unmapped.devctrl_device_id",          type: "string"  },
          { inputs: ["unmapped.desc_device_vid_pid"],     output: "unmapped.devctrl_device_vid_pid",     type: "string"  },
          { inputs: ["unmapped.desc_result_decision"],    output: "unmapped.devctrl_result_decision",    type: "string"  },
          { inputs: ["unmapped.desc_result_operation"],   output: "unmapped.devctrl_result_operation",   type: "string"  },
          { inputs: ["unmapped.leef_event_id"],           output: "unmapped.kaspersky_event_type",       type: "string"  },
          { inputs: ["unmapped.ksc_group_name"],          output: "unmapped.kaspersky_group",            type: "string"  },
        ],
        constants: [
          { value: 2004,                    field: "class_uid"      },
          { value: 2,                       field: "category_uid"   },
          { value: "Findings",              field: "category_name"  },
          { value: "Detection Finding",     field: "class_name"     },
          { value: 1,                       field: "activity_id"    },
          { value: "Create",                field: "activity_name"  },
          { value: 200401,                  field: "type_uid"       },
          { value: "Detection Finding: Create", field: "type_name"  },
        ],
      },

      // ======================================================================
      // PATH C: Password-protected archive found (GNRL_EV_PASSWD_ARCHIVE_FOUND)
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'GNRL_EV_PASSWD_ARCHIVE_FOUND'",
        renames: [
          { inputs: ["unmapped.leef_event_id"],           output: "finding_info.uid",              type: "string"  },
          { inputs: ["unmapped.task_name"],               output: "finding_info.analytic.name",    type: "string"  },
          { inputs: ["unmapped.desc_result_description"], output: "finding_info.title",            type: "string"  },
          { inputs: ["unmapped.file_path"],               output: "file.path",                     type: "string"  },
          { inputs: ["unmapped.desc_object_path"],        output: "file.path",                     type: "string"  },
          { inputs: ["unmapped.hostname"],                output: "device.hostname",               type: "string"  },
          { inputs: ["unmapped.src_ip"],                  output: "device.ip",                     type: "string"  },
          { inputs: ["unmapped.ext_username"],            output: "user.userid",                   type: "string"  },
          { inputs: ["unmapped.desc_user"],               output: "user.userid",                   type: "string"  },
          { inputs: ["unmapped.desc_process_id"],         output: "process.pid",                   type: "integer" },
          { inputs: ["unmapped.desc_app_path"],           output: "process.file.parent_folder",    type: "string"  },
          { inputs: ["unmapped.desc_name"],               output: "process.name",                  type: "string"  },
          { inputs: ["unmapped.leef_event_id"],           output: "unmapped.kaspersky_event_type", type: "string"  },
          { inputs: ["unmapped.ksc_group_name"],          output: "unmapped.kaspersky_group",      type: "string"  },
        ],
        constants: [
          { value: 2004,                    field: "class_uid"      },
          { value: 2,                       field: "category_uid"   },
          { value: "Findings",              field: "category_name"  },
          { value: "Detection Finding",     field: "class_name"     },
          { value: 1,                       field: "activity_id"    },
          { value: "Create",                field: "activity_name"  },
          { value: 200401,                  field: "type_uid"       },
          { value: "Detection Finding: Create", field: "type_name"  },
        ],
      },

      // ======================================================================
      // PATH D: Host status critical (KLSRV_HOST_STATUS_CRITICAL)
      // Security or health alert generated by the KSC Administration Server.
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'KLSRV_HOST_STATUS_CRITICAL'",
        renames: [
          { inputs: ["unmapped.leef_event_id"],    output: "finding_info.uid",              type: "string" },
          // EVC_EV_DESC contains the human-readable status reason and is the best
          // candidate for a title if a dedicated mapping is added later
          { inputs: ["unmapped.hostname"],         output: "device.hostname",               type: "string" },
          { inputs: ["unmapped.src_ip"],           output: "device.ip",                     type: "string" },
          { inputs: ["unmapped.leef_event_id"],    output: "unmapped.kaspersky_event_type", type: "string" },
          { inputs: ["unmapped.ksc_group_name"],   output: "unmapped.kaspersky_group",      type: "string" },
        ],
        constants: [
          { value: 2004,                    field: "class_uid"      },
          { value: 2,                       field: "category_uid"   },
          { value: "Findings",              field: "category_name"  },
          { value: "Detection Finding",     field: "class_name"     },
          { value: 1,                       field: "activity_id"    },
          { value: "Create",                field: "activity_name"  },
          { value: 200401,                  field: "type_uid"       },
          { value: "Detection Finding: Create", field: "type_name"  },
        ],
      },

      // ======================================================================
      // PATH E: Task state change (KLPRCI_TaskState)
      // Covers update tasks, device-control tasks, and scheduled tasks.
      // `managed_entity` represents the KSC task itself.
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'KLPRCI_TaskState'",
        renames: [
          { inputs: ["unmapped.task_name"],        output: "managed_entity.name",           type: "string"  },
          { inputs: ["unmapped.task_id"],          output: "managed_entity.uid",            type: "string"  },
          { inputs: ["unmapped.hostname"],         output: "device.hostname",               type: "string"  },
          { inputs: ["unmapped.src_ip"],           output: "device.ip",                     type: "string"  },
          { inputs: ["unmapped.leef_event_id"],    output: "unmapped.kaspersky_event_type", type: "string"  },
          { inputs: ["unmapped.ksc_group_name"],   output: "unmapped.kaspersky_group",      type: "string"  },
          { inputs: ["unmapped.task_new_state"],   output: "unmapped.task_new_state",       type: "string"  },
          { inputs: ["unmapped.task_old_state"],   output: "unmapped.task_old_state",       type: "string"  },
          { inputs: ["unmapped.kl_product_name"],  output: "unmapped.kl_product_name",      type: "string"  },
        ],
        constants: [
          { value: 3004,                    field: "class_uid"      },
          { value: 3,                       field: "category_uid"   },
          { value: "Identity & Access Management", field: "category_name" },
          { value: "Entity Management",     field: "class_name"     },
          { value: 3,                       field: "activity_id"    },
          { value: "Update",                field: "activity_name"  },
          { value: 300403,                  field: "type_uid"       },
          { value: "Entity Management: Update", field: "type_name"  },
          { value: "Task",                  field: "managed_entity.type" },
        ],
      },

      // ======================================================================
      // PATH F: Signature database updated (KLSRV_UPD_BASES_UPDATED)
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'KLSRV_UPD_BASES_UPDATED'",
        renames: [
          { inputs: ["unmapped.hostname"],         output: "device.hostname",               type: "string" },
          { inputs: ["unmapped.src_ip"],           output: "device.ip",                     type: "string" },
          { inputs: ["unmapped.leef_event_id"],    output: "unmapped.kaspersky_event_type", type: "string" },
          { inputs: ["unmapped.ksc_group_name"],   output: "unmapped.kaspersky_group",      type: "string" },
        ],
        constants: [
          { value: 3004,                         field: "class_uid"           },
          { value: 3,                            field: "category_uid"        },
          { value: "Identity & Access Management", field: "category_name"    },
          { value: "Entity Management",          field: "class_name"          },
          { value: 3,                            field: "activity_id"         },
          { value: "Update",                     field: "activity_name"       },
          { value: 300403,                       field: "type_uid"            },
          { value: "Entity Management: Update",  field: "type_name"           },
          { value: "Signature Database",         field: "managed_entity.name" },
          { value: "Database",                   field: "managed_entity.type" },
        ],
      },

      // ======================================================================
      // PATH G: Host auto-moved between admin groups (KLSRV_HOST_MOVED_WITH_RULE_EX)
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'KLSRV_HOST_MOVED_WITH_RULE_EX'",
        renames: [
          { inputs: ["unmapped.rule_name"],        output: "managed_entity.name",           type: "string" },
          { inputs: ["unmapped.hostname"],         output: "device.hostname",               type: "string" },
          { inputs: ["unmapped.src_ip"],           output: "device.ip",                     type: "string" },
          { inputs: ["unmapped.leef_event_id"],    output: "unmapped.kaspersky_event_type", type: "string" },
          { inputs: ["unmapped.ksc_group_name"],   output: "unmapped.kaspersky_group",      type: "string" },
          // Preserve source and destination admin groups in `unmapped`
          { inputs: ["unmapped.src_adm_group"],    output: "unmapped.ksc_src_admin_group",  type: "string" },
          { inputs: ["unmapped.dst_adm_group"],    output: "unmapped.ksc_dst_admin_group",  type: "string" },
        ],
        constants: [
          { value: 3004,                         field: "class_uid"           },
          { value: 3,                            field: "category_uid"        },
          { value: "Identity & Access Management", field: "category_name"    },
          { value: "Entity Management",          field: "class_name"          },
          { value: 3,                            field: "activity_id"         },
          { value: "Update",                     field: "activity_name"       },
          { value: 300403,                       field: "type_uid"            },
          { value: "Entity Management: Update",  field: "type_name"           },
          { value: "Host",                       field: "managed_entity.type" },
        ],
      },

      // ======================================================================
      // PATH H: Hardware device removed (KLNAG_EV_DEVICE_REMOVE)
      // Example: a monitor unplugged as detected by the KSC Network Agent.
      // ======================================================================
      {
        predicate: "unmapped.leef_event_id = 'KLNAG_EV_DEVICE_REMOVE'",
        renames: [
          { inputs: ["unmapped.ext_device_id"],    output: "managed_entity.name",           type: "string" },
          { inputs: ["unmapped.hostname"],         output: "device.hostname",               type: "string" },
          { inputs: ["unmapped.src_ip"],           output: "device.ip",                     type: "string" },
