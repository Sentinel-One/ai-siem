# Single-event STAR rule (queryType = "events").
# Fires in real time on every matching event. Supports mitigation.
# Body is boolean S1QL, NOT piped PowerQuery. A pipe '|' here is rejected by the
# API; put piped PowerQuery in a scheduled rule instead.

name = "DaC Example - Encoded PowerShell Command Line"
description = "Detects powershell.exe launched with an encoded command argument, a common defense-evasion and execution technique. MITRE T1059.001."
query_type = "events"
severity = "High"
status = "Draft"            # Draft never fires; flip to Active after review/DTAP
expiration_mode = "Permanent"

# Boolean S1QL. Escape any embedded double quotes.
# Use queryLang-2.0 operators (contains:anycase), NOT S1QL-1.0 forms (ContainsCIS):
# all custom rules run at 2.0, and a 1.0 operator is accepted at create but never fires.
s1ql = 'EventType = "Process Creation" AND TgtProcName = "powershell.exe" AND (TgtProcCmdLine contains:anycase("-enc") OR TgtProcCmdLine contains:anycase("-EncodedCommand"))'

treat_as_threat = "UNDEFINED"   # UNDEFINED | Suspicious | Malicious
network_quarantine = false

[scope]
site = "your-site"             # the target site name (resolved to a siteId at sync time); or site_ids = ["..."] / account_ids = ["..."]

# Governance source of truth. The API has no MITRE/tag/custom-attribute field on
# custom rules, so the sync engine folds mitre / mitre_tactics / tags / owner into
# a compact "[DaC]" footer on the rule description (visible in the console and on
# alerts). Other keys such as references stay repo-only for review and reporting.
[metadata]
mitre = ["T1059.001", "T1204.002"]     # technique IDs, appended to the description
mitre_tactics = ["TA0002", "TA0005"]   # tactic IDs
tags = ["powershell", "execution", "defense-evasion"]
owner = "detection-engineering"
references = ["https://attack.mitre.org/techniques/T1059/001/"]  # repo-only
