s\" :\n    event.dns.request contains:anycase(\"cursor.sh\") ? \"Cursor\" :\n    \"Other\"\n| let host = \"\uD83D\uDCBB \" + endpoint.name\n| let proc = src.process.name != null ? \"⚙️ \" + src.process.name + \" (process)\" : \"⚙️ System/Kernel (no process)\"\n| group c = count() by vendor, host, proc\n| sort -c\n| limit 35\n| let link = array(0, 1, 2).expand()\n| let source = link == 0 ? \"All AI DNS Lookups\" :\n               link == 1 ? vendor : host\n| let target = link == 0 ? vendor :\n               link == 1 ? host : proc\n| group c = sum(c) by source, target\n| columns source, target, c",
