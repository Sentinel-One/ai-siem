contains:anycase(\"api.githubcopilot.com\") ? \"api.githubcopilot.com\" :\n    event.dns.request contains:anycase(\"huggingface.co\") ? \"huggingface.co\" :\n    event.dns.request contains:anycase(\"stability.ai\") ? \"stability.ai\" :\n    event.dns.request contains:anycase(\"replit.com\") ? \"replit.com\" :\n    event.dns.request contains:anycase(\"v0.dev\") ? \"v0.dev\" :\n    event.dns.request contains:anycase(\"bolt.new\") ? \"bolt.new\" :\n    event.dns.request contains:anycase(\"cursor.sh\") ? \"cursor.sh\" :\n    \"\"\n| filter(domain != \"\")\n| group Count = count() by domain\n| sort -Count\n| limit 12",
