    product\": \"Meraki Flow Logs\",\n  \"version\": \"1.0\",\n  \"event_type\": \"security_event\",\n\
    \  \"message\": \"Sample Cisco Meraki Flow Logs event at 2026-04-20T03:40:52.751732Z\",\n  \"severity\"\
    : \"critical\",\n  \"category\": \"security\",\n  \"source_ip\": \"192.168.130.22\",\n  \"user\":\
    \ \"user6200\",\n  \"device\": \"device-444\",\n  \"log_level\": \"WARN\",\n  \"event_id\": 28251,\n\
    \  \"session_id\": \"sess_177986\",\n  \"class_name\": \"Security Event\",\n  \"activity_name\": \"\
    Log Generated\",\n  \"location\": \"Tokyo\"\n}"
