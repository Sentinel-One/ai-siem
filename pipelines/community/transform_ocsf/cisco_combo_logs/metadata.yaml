metadata_details:
  purpose: OCSF-compliant Lua serializer for Cisco Combo Logs. Maps source events to OCSF Network Activity
    (class_uid=4001) following the processEvent contract.
  datasource_vendor: cisco
  dataSource: Cisco Combo Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  sample_record: "{\n  \"timestamp\": \"2026-04-19T14:09:53.030684+00:00\",\n  \"hostname\": \"router-29\"\
    ,\n  \"device_ip\": \"30.133.137.140\",\n  \"facility\": \"LOCAL4\",\n  \"severity\": \"info\",\n\
    \  \"mnemonic\": \"STATE\",\n  \"facility_mnemonic\": \"TRACKING\",\n  \"sequence_number\": 342870,\n\
    \  \"message\": \"1 ip sla 1 reachability Up->Down\",\n  \"raw_message\": \"*Apr 19 14:09:53.030:\
    \ %TRACKING-INFO-STATE: 1 ip sla 1 reachability Up->Down\",\n  \"process_name\": \"TRACKING\",\n \
    \ \"ios_version\": \"12.9.4\",\n  \"hardware_platform\": \"C2960\",\n  \"uptime\": \"357 days, 0 hours,\
    \ 49 minutes\",\n  \"location\": \"Branch-Office\"\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
    class_uid: 4001
    class_name: Network Activity
    category_uid: 4
    category_name: Network Activity
