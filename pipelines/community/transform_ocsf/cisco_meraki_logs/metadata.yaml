metadata_details:
  purpose: OCSF-compliant Lua serializer for Cisco Meraki Logs. Maps source events to OCSF Network Activity
    (class_uid=4001) following the processEvent contract.
  datasource_vendor: cisco
  dataSource: Cisco Meraki Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
  ingest_mode: "Syslog"
  auth_type: "N/A"
  sample_record: "{\n  \"timestamp\": \"2026-04-20T03:40:52Z\",\n  \"syslog_priority\": 135,\n  \"unix_timestamp\"\
    : 1776656452,\n  \"hostname\": \"meraki-mx64\",\n  \"log_type\": \"vpn_firewall\",\n  \"src_ip\":\
    \ \"10.0.34.12\",\n  \"dst_ip\": \"93.184.232.81\",\n  \"protocol\": \"tcp\",\n  \"src_port\": 64270,\n\
    \  \"dst_port\": 80,\n  \"vpn_firewall_pattern\": \"blocked 443\",\n  \"message\": \"<135> 1776656452\
    \ meraki-mx64 vpn_firewall src=10.0.34.12 dst=93.184.232.81 protocol=tcp sport=64270 dport=80 pattern:\
    \ blocked 443\"\n}"
  dependency_summary: Requires Observo OCSFSerializer template with Lua runtime (lupa). Source events
    must match the field layout exercised by the Lua mappings.
  performance_impact: Single-event transform, ~? lines. Field-for-field normalization with helper-based
    nested access.
  ocsf_mapping:
