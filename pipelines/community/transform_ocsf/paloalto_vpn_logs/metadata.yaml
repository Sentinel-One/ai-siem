  purpose: OCSF-compliant Lua serializer bound to the upstream parser at parsers/community/paloalto_vpn_logs-latest/.
    Maps that parser's output to OCSF Network Activity (class_uid=4001) for PAN-OS GlobalProtect
    VPN traffic logs. For general PAN-OS firewall logs (TRAFFIC, THREAT subtypes) see paloalto_logs/
    or paloalto_alternate_logs/.
  datasource_vendor: palo_alto
  dataSource: Paloalto Vpn Logs
  format: source-specific JSON/KV/syslog
  ocsf_version: 1.3.0
  ingestion_method: Observo OCSFSerializer (Lua-based transform)
