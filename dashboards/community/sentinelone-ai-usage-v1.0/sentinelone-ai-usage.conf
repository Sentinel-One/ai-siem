{
  "version":"1.1.5",
  "configType":"TABBED",
  "description":"AI activity visibility dashboard for tracked AI-related web domains and known AI-related applications. Web activity is based on domain matching against a defined list of common AI destinations. Application activity is based on process-name detection from a predefined list of known AI application names.",
  "tabs":[
    {
      "tabName":"README 📘",
      "graphs":[
        {
          "title":"How to read this dashboard",
          "graphStyle":"markdown",
          "markdown":"### What this dashboard shows\n\nThis dashboard is built to answer a narrow set of questions clearly.\n\n**Known AI-related web activity**\n- Traffic to a tracked list of AI-related domains: ChatGPT / OpenAI, Claude / Anthropic, Gemini / Google AI, NotebookLM, Copilot, Perplexity, Grok / xAI, Poe, DeepSeek, Meta AI, Character.AI, and Midjourney\n- Which endpoints, users, and source processes were associated with that web activity\n- Which tracked domains accounted for the most observed activity in the selected time range\n\n**Known AI-related DNS activity**\n- DNS lookups to the same tracked domain list\n- Which endpoints and processes generated those lookups\n- DNS = coverage, not attribution. A DNS lookup does not prove a user interacted with an AI tool.\n\n**Known AI applications (process-name detection)**\n- Launches of a predefined list of known AI-related application process names: ChatGPT, Claude, Perplexity, Copilot, Cursor, Windsurf, Poe, LM Studio, Jan, Ollama, AnythingLLM, Flowise, Tabby, and DeepSeek\n- Which endpoints launched those applications most often in the selected time range\n- Which tracked application names accounted for the most observed launch activity\n\n### What \"known\" means in this dashboard\nKnown does not mean every AI tool in the environment.\n\nIt means this dashboard only looks for:\n- a tracked list of AI-related web domains for web activity\n- a predefined list of application process names for application activity\n\nFor web activity, the tracked domain list in this dashboard includes:\n- chatgpt.com / openai.com\n- claude.ai / anthropic.com\n- gemini.google.com / ai.google.dev\n- notebooklm.google.com\n- copilot.microsoft.com\n- perplexity.ai\n- grok.com / x.ai\n- poe.com\n- deepseek.com\n- meta.ai\n- character.ai\n- midjourney.com\n- copilot-proxy.githubusercontent.com / api.githubcopilot.com\n- huggingface.co\n- stability.ai\n- replit.com\n- v0.dev / bolt.new\n- cursor.sh\n\nFor application activity, the predefined process-name list in this dashboard includes:\n- ChatGPT\n- Claude\n- Perplexity\n- Copilot\n- Cursor\n- Windsurf\n- LM Studio\n- Jan\n- Ollama\n- AnythingLLM\n- Flowise\n- Tabby\n- DeepSeek\n\nApplications not included in this list will not appear in the application panels.\n\n### What this dashboard can support\nUse this dashboard to:\n- identify which endpoints, users, and tracked tools are involved in observed activity\n- baseline tracked AI-related activity across the environment\n- investigate which domains, processes, and endpoints account for the most activity in the selected time range\n\n### What this dashboard cannot support\nThis dashboard does not show:\n- prompt content\n- response content\n- files or text exchanged within sessions\n- whether a browser visit resulted in actual model use\n- whether a launched application actively used AI features after starting\n\n### How to interpret the sources\n- DNS = coverage, not attribution\n- URL = richer browser-level visibility\n- Applications = local execution visibility\n\n### AI Agent & Model Discovery\n- Indicator-based discovery for AI agent frameworks and local model artifacts\n- These panels show potential signals, not confirmed usage \u2014 analyst validation is recommended\n- Presence of model files (.gguf, .safetensors, .pt, etc.) indicates local AI model files are present and may represent staging or potential capability\n- Agent framework indicators (OpenClaw, Moltbot, NanoClaw, PicoClaw) are pattern-matched and may need investigation to confirm\n\nCounts across DNS, URL, and Application panels are not deduplicated and should be interpreted as directional activity, not exact usage totals.\n\n### Time and filter behavior\n- The global time picker controls all panels\n- All references to selected time range mean the dashboard's current global time filter\n- Filters narrow the data shown in each tab but do not change what the dashboard is capable of proving\n\n### Sankey Legend\n- \uD83D\uDCBB = Endpoint (machine name)\n- \uD83D\uDC64 = User (account name)\n- ⚙️ = Process (application or service)\n",
          "layout":{
  h: 26,
  w: 59,
  x: 0,
  y: 0
},
          "description":"Overview of dashboard scope, signal sources, tracked entities, limitations, and how to read the sankey charts."
        }
