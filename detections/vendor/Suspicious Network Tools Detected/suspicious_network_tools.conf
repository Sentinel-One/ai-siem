dataSource.name = 'SentinelOne' 
  AND endpoint.os = 'linux' 
  AND event.type = 'Process Creation' 
  AND tgt.process.name in 
    ('nmap', 'amap', 'zmap', 'hping3', 'chisel', 'zenmap', 'xenmap', 'sqlmap', 'dirbuster', 'nikto', 'gobuster', 'feroxbuster', 'masscan', 'metasploit', 'empire', 'msfconsole', 'exploitdb', 'wpscan') 
  AND tgt.process.cmdline = *
